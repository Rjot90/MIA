version: '3.9'

# ==============================================================================
# DOCKER COMPOSE : Orchestration du service Local AI Assistant
# ==============================================================================

services:
  local-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-ai-assistant
    runtime: nvidia
    env_file:
      - .env
    
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, utility, compute]

    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./documents:/app/documents
      - ./logs:/app/logs

    ports:
      - "8000:8000"

    # ========================================================================
    # VARIABLES D'ENVIRONNEMENT (PROPRES ET FUSIONNÉES)
    # ========================================================================
    environment:
      # Autorisations NVIDIA
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      CUDA_VISIBLE_DEVICES: "0"
      LD_LIBRARY_PATH: "/usr/lib/x86_64-linux-gnu"
      
      # Configuration de l'App
      DEBUG: "false"
      DATA_PATH: "/app/data"
      MODELS_PATH: "/app/models"
      DOCUMENTS_PATH: "/app/documents"
      LOG_LEVEL: "INFO"
      LOG_FILE: "/app/logs/app.log"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - local-ai-network
    
    privileged: false
    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-ai-discord-bot
    command: python bot/discord_bot.py
    env_file:
      - .env.phase2
    depends_on:
      local-ai:
        condition: service_healthy
    networks:
      - local-ai-network
    restart: unless-stopped
    healthcheck:
      disable: true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  local-ai-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16